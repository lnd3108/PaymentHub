<div class="space-y-8">
  <section class="flex items-start justify-between gap-4">
    <div>
      <p class="text-sm text-gray-500">Trang chủ > Tham số danh mục theo nhóm</p>
      <h1 class="mt-2 text-4xl font-bold tracking-tight text-[#1f2937]">
        Tham số danh mục theo nhóm
      </h1>
    </div>

    <button
      type="button"
      (click)="goCreate()"
      class="rounded-xl bg-[#007c7a] px-6 py-3 font-semibold text-white shadow-sm transition hover:bg-[#006766]"
    >
      + Thêm mới
    </button>
  </section>

  <section class="rounded-3xl border border-gray-100 bg-white p-6 shadow-sm">
    <div class="mb-5">
      <h2 class="text-lg font-semibold text-[#2f3437]">Bộ lọc tìm kiếm</h2>
      <p class="mt-1 text-sm text-gray-500">
        Nhập thông tin để tìm kiếm danh sách tham số
      </p>
    </div>

    <app-category-filters
      [statusOptions]="statusOptions"
      [activeOptions]="activeOptions"
      [currentFilters]="currentFilters"
      (search)="onSearch($event)"
      (reset)="onResetFilters()"
    />
  </section>

  <section class="overflow-hidden rounded-3xl border border-gray-100 bg-white shadow-sm">
    <div class="flex items-center justify-between border-b border-gray-100 px-6 py-5">
      <div class="flex items-center gap-3">
        <h2 class="text-[22px] font-semibold text-[#2f3437]">Danh sách bản ghi</h2>
        <span
          class="inline-flex min-w-8 items-center justify-center rounded-full border border-gray-200 bg-gray-50 px-2.5 py-1 text-xs font-medium text-gray-600"
        >
          {{ categories.length }}
        </span>
      </div>

      <button
        type="button"
        (click)="exportExcel()"
        class="rounded-xl border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 transition hover:bg-gray-50"
      >
        ⭳ Xuất Excel
      </button>
    </div>

    <div class="px-6 py-5">
      <div class="rounded-2xl border border-gray-100 bg-white">
        <app-category-table
          [categories]="categories"
          [loading]="loading"
          [error]="error"
          [page]="page"
          [size]="size"
          [totalElements]="totalElements"
          [totalPages]="totalPages"
          (viewDetail)="goDetail($event)"
          (edit)="goEdit($event)"
          (copy)="goCopy($event)"
          (viewSubmit)="goSubmit($event)"
          (viewApprove)="goApprove($event)"
          (viewCancelApprove)="goCancelApprove($event)"
          (delete)="deleteCategory($event)"
          (pageChange)="onPageChange($event)"
          (sizeChange)="onSizeChange($event)"
        ></app-category-table>
      </div>
    </div>
  </section>
</div>
